<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Sky OFFC</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(138,43,226,0.3);
        }

        img {
            border-radius: 12px;
            max-width: 280px;
            margin-top: 15px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #c084fc;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="title">KING SKY</div>
    <div class="subtitle">OFFC</div>

    <div class="card">
        <p>Scan QRIS untuk pembayaran</p>

        <!-- 🔥 GANTI NAMA FILE KALO PERLU -->
        <img src="payment.jpeg" alt="QRIS Payment">

        <p style="margin-top:10px; font-size:14px; color:#ccc;">
            Screenshot jika perlu
        </p>
    </div>

</body>
</html>
