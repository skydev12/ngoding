<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Sky OFFC</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .btn {
            background: linear-gradient(to right, purple, pink);
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            cursor: pointer;
            margin-top: 20px;
        }

        img {
            margin-top: 20px;
            border-radius: 12px;
            max-width: 250px;
        }
    </style>
</head>
<body>

    <h1 style="font-size:40px;">KING SKY OFFC</h1>

    <!-- Tombol -->
    <div id="downloadBtn" class="btn">
        DOWNLOAD PAYMENT
    </div>

    <!-- Preview Image -->
    <div>
        <p>Preview Payment (kalau ga bisa download bisa SS)</p>
        <img src="payment.jpeg" alt="payment">
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {

            // 🔥 GANTI INI DENGAN LINK GITHUB KAMU
            const url = 'https://username.github.io/nama-repo/payment.jpeg';

            // buka di tab baru
            window.open(url, '_blank');

            // paksa download
            const link = document.createElement('a');
            link.href = url;
            link.download = 'payment.jpeg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>

</body>
</html>
